---
# ── playbook: deploy.yml ──────────────────────────────────────────
# Despliega un image_sha concreto al entorno indicado.
#
# Uso:
#   ansible-playbook playbooks/deploy.yml \
#     -e env=staging \
#     -e image_sha=sha256:a1b2c3d4...
#
# Idempotencia: ejecutar dos veces seguidas con el mismo image_sha
# debe devolver changed=0 la segunda vez.

- name: "Deploy OMS — {{ env | default('?') }}"
  hosts: localhost
  gather_facts: false
  connection: local
  vars_files:
    - "../group_vars/all.yml"
    - "../group_vars/{{ env }}.yml"

  pre_tasks:
    - name: "Validar parámetros obligatorios"
      ansible.builtin.assert:
        that:
          - env is defined
          - env in ['staging', 'production']
          - image_sha is defined
          - image_sha is match('^sha256:[a-f0-9]{64}$')
        fail_msg: |
          Faltan parámetros o image_sha no es un digest válido.
          Uso: ansible-playbook playbooks/deploy.yml \
                 -e env=<staging|production> \
                 -e image_sha=sha256:<64 hex chars>

    - name: "Mostrar resumen del despliegue"
      ansible.builtin.debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════╗
          ║  Entorno:        {{ env }}
          ║  Proyecto GCP:   {{ gcp_project }}
          ║  Servicio:       {{ cloud_run_service }}
          ║  Imagen:         {{ image_repo }}@{{ image_sha }}
          ║  Min/Max inst:   {{ cloud_run_min_instances }}/{{ cloud_run_max_instances }}
          ║  Tráfico nuevo:  {{ traffic_percent }}%
          ╚═══════════════════════════════════════════════════════════╝

  roles:
    - role: oms_cloud_run
      vars:
        oms_cloud_run_full_image: "{{ image_repo }}@{{ image_sha }}"

  post_tasks:
    - name: "Obtener URL del servicio Cloud Run"
      ansible.builtin.command:
        cmd: >-
          gcloud run services describe {{ cloud_run_service }}
          --region={{ region }}
          --format=value(status.url)
      register: service_url
      changed_when: false

    # NOTA — verificado con un deploy real: el dominio público por defecto de
    # Cloud Run (*.a.run.app) es servido por el mismo Google Frontend que usa
    # www.google.com, y ESE borde intercepta la ruta literal "/healthz" antes
    # de que llegue al contenedor (devuelve el 404 genérico de Google, no un
    # 404 de la app ni de Cloud Run). Se comprobó con curl contra la URL
    # principal, la URL con tag de revisión y varias rutas de control
    # (/health, /healthcheck, /foo, / — todas responden 200 salvo /healthz).
    # Los health/liveness probes INTERNOS de Cloud Run (terraform/modules/
    # compute/main.tf) sí usan /healthz sin problema porque no atraviesan ese
    # borde público. Por eso esta verificación externa golpea "/" — el mismo
    # servidor Node.js, pero por una ruta que Google no se reserva.
    - name: "Verificar healthcheck del servicio desplegado"
      ansible.builtin.uri:
        url: "{{ service_url.stdout }}/"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 5
      delay: 6
      until: health_result.status == 200

    - name: "Notificar a Slack"
      # bonus: sin webhook configurado en este ejercicio, se deja el mensaje
      # formateado listo para un ansible.builtin.uri POST a un Slack Incoming
      # Webhook (community.general.slack también serviría) el día que exista
      # el secreto SLACK_WEBHOOK_URL en el entorno de CI.
      ansible.builtin.debug:
        msg: |
          [{{ slack_channel }}] Despliegue OK en {{ env }}: {{ cloud_run_service }} → {{ image_sha }}
          URL: {{ service_url.stdout }}/ respondió 200
