[defaults]
inventory                   = inventory/gcp.yml
roles_path                  = roles
collections_path            = .collections
host_key_checking           = False
# community.general.yaml se eliminó en community.general >= 12.0 (superseded
# por result_format=yaml en el callback default). Ver DECISIONES.md.
stdout_callback             = default
result_format               = yaml
forks                       = 10
retry_files_enabled         = False
interpreter_python          = auto_silent

[inventory]
enable_plugins              = google.cloud.gcp_compute, yaml, ini

[ssh_connection]
pipelining                  = True
control_path                = ~/.ssh/ansible-cp-%%h-%%p-%%r
