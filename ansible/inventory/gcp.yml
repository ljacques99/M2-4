---
# Inventario dinámico de GCP.
#
# El playbook de despliegue de Cloud Run no necesita SSH a hosts — usa la API
# directamente desde el control node. Pero este inventario sirve para:
#   1. Localhost como host de control (siempre presente)
#   2. BONUS bastion: cualquier VM Compute con label role=bastion la descubre
#
# Uso:
#   ansible-inventory -i inventory/gcp.yml --graph

# El plugin gcp_compute NO templa Jinja/lookup() dentro de `projects:` (se
# comprobó en ejecución real: pasa el string "{{ lookup(...) }}" sin evaluar
# a la API y GCP responde 403). Por eso aquí van los dos proyectos reales en
# vez de una variable de entorno — de todas formas el objetivo de este
# inventario es descubrir bastions en CUALQUIERA de los dos entornos.
plugin: google.cloud.gcp_compute
projects:
  - acmeoms-platform
  - acmeoms-platform-prod
zones:
  - europe-west3-a
  - europe-west3-b
  - europe-west3-c
auth_kind: application
filters:
  - "status = RUNNING"

keyed_groups:
  - key: labels.env
    prefix: env
  - key: labels.role
    prefix: role

# Usar IP privada (no exponer)
hostnames:
  - networkInterfaces[0].networkIP

compose:
  ansible_host: networkInterfaces[0].networkIP
